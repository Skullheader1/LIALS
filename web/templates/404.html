<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 – Seite nicht gefunden</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Space Mono', monospace;
      overflow: hidden;
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .code {
      font-size: clamp(8rem, 20vw, 16rem);
      font-weight: 700;
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 2px #ff3c3c;
      animation: glitch 3s infinite;
      position: relative;
    }

    .code::after {
      content: '404';
      position: absolute;
      left: 4px;
      top: 4px;
      -webkit-text-stroke: 2px #00e5ff;
      opacity: 0.4;
      animation: glitch2 3s infinite;
    }

    .message {
      font-size: 1.1rem;
      margin-top: 1.5rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #666;
    }

    .back {
      display: inline-block;
      margin-top: 2.5rem;
      padding: 0.75rem 2rem;
      border: 1px solid #333;
      color: #aaa;
      text-decoration: none;
      letter-spacing: 0.15em;
      font-family: inherit;
      font-size: 0.85rem;
      transition: all 0.3s;
    }

    .back:hover {
      border-color: #ff3c3c;
      color: #ff3c3c;
      box-shadow: 0 0 20px rgba(255, 60, 60, 0.15);
    }

    .noise {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.015) 2px,
        rgba(255,255,255,0.015) 4px
      );
      pointer-events: none;
    }

    @keyframes glitch {
      0%, 90%, 100% { transform: translate(0); }
      92% { transform: translate(-3px, 2px); }
      94% { transform: translate(3px, -2px); }
      96% { transform: translate(-2px, -1px); }
      98% { transform: translate(2px, 1px); }
    }

    @keyframes glitch2 {
      0%, 88%, 100% { transform: translate(0); }
      90% { transform: translate(5px, -3px); }
      93% { transform: translate(-4px, 3px); }
      96% { transform: translate(3px, 2px); }
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="container">
    <div class="code">404</div>
    <p class="message">Page not found</p>
    <a href="/" class="back">← Back to main page</a>
  </div>
</body>
</html>
