<!DOCTYPE html>
<html lang="de" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1050;
            pointer-events: auto;
        }
        .toast-container .alert {
            min-width: 300px;
            margin-bottom: 10px;
            opacity: 1;
            transition: opacity 0.5s ease-out;
        }
        .toast-container .alert.fade-out {
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="toast-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">
                <div class="card">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <a href="{{ url_for('index') }}" class="text-decoration-none">← Back</a>
                        </div>

                        <h1 class="card-title text-center mb-4 h4">Change password</h1>

                        <form method="POST" action="{{ url_for('change_password') }}">
                            <div class="mb-3">
                                <label for="user_name" class="form-label">Username</label>
                                <input type="text" class="form-control" id="user_name" name="user_name" required autofocus>
                            </div>
                            <div class="mb-3">
                                <label for="current_password" class="form-label">Current password</label>
                                <input type="password" class="form-control" id="current_password" name="current_password" required autofocus>
                            </div>

                            <div class="mb-3">
                                <label for="new_password" class="form-label">New password</label>
                                <input type="password" class="form-control" id="new_password" name="new_password" required minlength="8">
                            </div>

                            <div class="mb-3">
                                <label for="new_password_confirm" class="form-label">Repeat new password</label>
                                <input type="password" class="form-control" id="new_password_confirm" name="new_password_confirm" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">Change password</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelectorAll('.toast-container .alert').forEach(function(alert) {
            setTimeout(function() {
                alert.classList.add('fade-out');
                setTimeout(function() {
                    alert.remove();
                }, 500);
            }, 5000);
        });
    </script>
</body>
</html>
